<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button Generator — DM Design System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../../tokens/dm_tokens.css" />
    <link rel="stylesheet" href="../../tokens/dm_typography_web_tokens.css" />

    <style>
      /* ── Reset ── */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--typography-font-family-sans);
        height: 100vh;
        display: flex;
        overflow: hidden;
        color: var(--color-text-neutral-darker);
        background: var(--color-background-neutral-lightest);
        -webkit-font-smoothing: antialiased;
      }

      /* ─────────────────────────────────────────
         Left Panel
      ───────────────────────────────────────── */
      .gen-panel {
        width: 300px;
        flex-shrink: 0;
        background: #fff;
        border-right: 1px solid var(--color-border-neutral-light);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 0;
      }

      .panel-header {
        padding: 20px 20px 16px;
        border-bottom: 1px solid var(--color-border-neutral-light);
        flex-shrink: 0;
      }

      .panel-title {
        font-size: var(--typography-font-size-label-md);
        font-weight: var(--typography-font-weight-semibold);
        line-height: var(--typography-line-height-narrow);
        color: var(--color-text-neutral-darker);
      }

      .panel-controls {
        padding: 16px 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      /* ── Control Group ── */

      .ctrl-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--color-text-neutral-grey-dark);
        margin-bottom: 7px;
        display: block;
      }

      .ctrl-seg {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      .ctrl-seg-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 7px 14px;
        border-radius: 999px;
        border: 1px solid var(--color-border-neutral-grey-light);
        background: transparent;
        cursor: pointer;
        font-family: var(--typography-font-family-sans);
        font-size: var(--typography-font-size-label-sm);
        font-weight: var(--typography-font-weight-semibold);
        color: var(--color-text-neutral-dark);
        line-height: 1;
        transition:
          background 80ms ease,
          border-color 80ms ease,
          color 80ms ease;
        white-space: nowrap;
        -webkit-font-smoothing: antialiased;
      }

      .ctrl-seg-btn:hover {
        border-color: var(--color-border-neutral-darker);
        color: var(--color-text-neutral-darker);
        background: var(--color-background-neutral-lightest);
      }

      .ctrl-seg-btn.is-active {
        background: var(--color-background-neutral-darker);
        border-color: var(--color-background-neutral-darker);
        color: var(--color-text-neutral-lightest);
      }

      /* ── Background picker ── */
      .ctrl-bg-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .ctrl-swatches {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .ctrl-swatch {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        padding: 0;
        flex-shrink: 0;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.18);
        background-size: cover;
        background-position: center;
        transition:
          transform 80ms ease,
          box-shadow 80ms ease;
      }

      .ctrl-swatch:hover {
        transform: scale(1.15);
      }

      .ctrl-swatch.is-active {
        box-shadow:
          0 0 0 2px #fff,
          0 0 0 3.5px var(--color-background-neutral-darker);
      }

      .ctrl-color-pick {
        position: relative;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        cursor: pointer;
        flex-shrink: 0;
        overflow: hidden;
        background: conic-gradient(from 0deg, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.18);
        transition:
          transform 80ms ease,
          box-shadow 80ms ease;
      }

      .ctrl-color-pick:hover {
        transform: scale(1.15);
      }

      .ctrl-color-pick.is-active {
        box-shadow:
          0 0 0 2px #fff,
          0 0 0 3.5px var(--color-background-neutral-darker);
      }

      .ctrl-color-pick input[type="color"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        width: 100%;
        height: 100%;
        cursor: pointer;
        border: none;
        padding: 0;
      }

      /* ─────────────────────────────────────────
         Main Preview Area
      ───────────────────────────────────────── */
      .gen-main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
      }

      .gen-preview-main {
        position: relative;
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 150ms ease;
        min-height: 0;
      }

      /* ── Preview label ── */
      .preview-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }
      .preview-label {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
      }
      .preview-label-name {
        font-size: var(--typography-font-size-h5);
        font-weight: var(--typography-font-weight-semibold);
        color: var(--color-text-neutral-darker);
        line-height: var(--typography-line-height-narrow);
        transition: color 150ms ease;
      }
      .preview-label-meta {
        font-size: var(--typography-font-size-label-sm);
        font-weight: var(--typography-font-weight-semibold);
        color: var(--color-text-neutral-grey-dark);
        line-height: var(--typography-line-height-narrow);
        transition: color 150ms ease;
      }

      /* ── Token note ── */
      .token-note {
        position: absolute;
        top: 16px;
        right: 16px;
        width: 252px;
        background: #fef9a0;
        padding: 14px 16px 16px;
        border-radius: 8px;
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.08),
          2px 4px 16px rgba(0, 0, 0, 0.16);
        z-index: 999;
      }
      .tn-heading {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #8a7a00;
        padding-bottom: 7px;
        margin-bottom: 8px;
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
      }
      .tn-section {
        margin-bottom: 8px;
      }
      .tn-section:last-child {
        margin-bottom: 0;
      }
      .tn-section + .tn-section {
        padding-top: 8px;
        border-top: 1px dashed rgba(0, 0, 0, 0.1);
      }
      .tn-state {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #9a8a10;
        margin-bottom: 4px;
      }
      .tn-token {
        display: block;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        font-weight: 600;
        color: #b60000;
        line-height: 1.2;
        margin-bottom: 0.5rem;
      }
      .tn-shadow {
        display: block;
        font-family: "Courier New", Courier, monospace;
        font-size: 12px;
        font-weight: 600;
        color: #b60000;
        line-height: 1.2;
        margin-bottom: 0.5rem;
      }

      /* ── States Row ── */
      .gen-states {
        height: 148px;
        flex-shrink: 0;
        display: flex;
        border-top: 1px solid var(--color-border-neutral-light);
        transition:
          background 150ms ease,
          border-top-color 150ms ease;
      }

      .gen-states.is-dark {
        background: #1a1a1a;
        border-top-color: #2a2a2a;
      }

      .gen-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 16px 12px;
      }

      .gen-state + .gen-state {
        border-left: 1px solid var(--color-border-neutral-light);
      }

      .gen-states.is-dark .gen-state + .gen-state {
        border-left-color: #2a2a2a;
      }

      .gen-state-preview {
        display: flex;
        align-items: center;
        justify-content: center;
        flex: 1;
        width: 100%;
      }

      .gen-state-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--color-text-neutral-grey-dark);
        flex-shrink: 0;
      }

      .gen-states.is-dark .gen-state-label {
        color: #555;
      }

      /* ══════════════════════════════════════════════════════════
         Button Base
      ══════════════════════════════════════════════════════════ */

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 40px;
        padding: 0 14px;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        font-family: var(--typography-font-family-sans);
        font-size: var(--typography-font-size-label-md);
        font-weight: var(--typography-font-weight-semibold);
        line-height: var(--typography-line-height-narrow);
        letter-spacing: 0;
        white-space: nowrap;
        -webkit-font-smoothing: antialiased;
        transition:
          background-color 80ms ease,
          box-shadow 80ms ease;
        position: relative;
      }

      /* ── Size modifiers ── */
      .btn--xs {
        height: 28px;
        padding: 0 10px;
        font-size: var(--typography-font-size-label-xxsm);
      }
      .btn--xs .btn__content {
        gap: 4px;
      }
      .btn--xs.btn--icon-only {
        width: 28px;
        padding: 0;
      }

      .btn--sm {
        height: 34px;
        padding: 0 12px;
        font-size: var(--typography-font-size-label-sm);
      }
      .btn--sm .btn__content {
        gap: 5px;
      }
      .btn--sm.btn--icon-only {
        width: 34px;
        padding: 0;
      }

      .btn--lg {
        height: 46px;
        padding: 0 16px;
        font-size: var(--typography-font-size-label-lg);
      }
      .btn--lg .btn__content {
        gap: 8px;
      }
      .btn--lg.btn--icon-only {
        width: 46px;
        padding: 0;
      }

      .btn--xl {
        height: 52px;
        padding: 0 18px;
        font-size: var(--typography-font-size-label-xl);
      }
      .btn--xl .btn__content {
        gap: 10px;
      }
      .btn--xl.btn--icon-only {
        width: 52px;
        padding: 0;
      }

      .btn--icon-only {
        width: 40px;
        padding: 0;
      }

      .btn__content {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .btn__content svg {
        width: 1em;
        height: 1em;
        flex-shrink: 0;
      }

      /* ── Loading ── */
      @keyframes btn-spin {
        to {
          transform: rotate(360deg);
        }
      }

      .btn svg.btn-spinner {
        display: none;
      }

      .btn--loading {
        pointer-events: none;
        cursor: not-allowed;
      }

      .btn--loading .btn__label,
      .btn--loading .btn__content {
        visibility: hidden;
      }

      .btn--loading svg.btn-spinner {
        display: block;
        position: absolute;
        top: 50%;
        left: 50%;
        width: 24px;
        height: 24px;
        margin-top: -12px;
        margin-left: -12px;
        opacity: 0.4;
        animation: btn-spin 1.2s linear infinite;
      }

      .btn--xs.btn--loading svg.btn-spinner {
        width: 16px;
        height: 16px;
        margin-top: -8px;
        margin-left: -8px;
      }
      .btn--sm.btn--loading svg.btn-spinner {
        width: 20px;
        height: 20px;
        margin-top: -10px;
        margin-left: -10px;
      }
      .btn--lg.btn--loading svg.btn-spinner {
        width: 28px;
        height: 28px;
        margin-top: -14px;
        margin-left: -14px;
      }
      .btn--xl.btn--loading svg.btn-spinner {
        width: 32px;
        height: 32px;
        margin-top: -16px;
        margin-left: -16px;
      }

      .is-hover,
      .is-pressed {
        pointer-events: none;
      }

      .btn--dissolve {
        transition:
          background-color 1s ease,
          box-shadow 1s ease !important;
      }

      /* ══════════════════════════════════════════════════════════
         Primary Variants
      ══════════════════════════════════════════════════════════ */

      .btn-brand {
        background-color: var(--color-background-interaction-primary-default);
        color: var(--color-text-neutral-white);
      }
      .btn-brand:hover {
        background-color: var(--color-background-interaction-primary-hover);
      }
      .btn-brand:active {
        background-color: var(--color-background-interaction-primary-pressed);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-brand.is-hover {
        background-color: var(--color-background-interaction-primary-hover);
      }
      .btn-brand.is-pressed {
        background-color: var(--color-background-interaction-primary-pressed);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-brand.btn--loading {
        background-color: var(--color-background-interaction-primary-pressed);
      }

      .btn-neutral {
        background-color: var(--color-background-neutral-darker);
        color: var(--color-text-neutral-lightest);
      }
      .btn-neutral:hover {
        background-color: var(--color-background-neutral-dark);
      }
      .btn-neutral:active {
        background-color: var(--color-background-neutral-grey-dark);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-neutral.is-hover {
        background-color: var(--color-background-neutral-dark);
      }
      .btn-neutral.is-pressed {
        background-color: var(--color-background-neutral-grey-dark);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-neutral.btn--loading {
        background-color: var(--color-background-neutral-grey-dark);
      }

      .btn-neutral-inverse {
        background-color: var(--color-background-neutral-light);
        color: var(--color-text-neutral-darker);
      }
      .btn-neutral-inverse:hover {
        background-color: var(--color-background-neutral-white);
      }
      .btn-neutral-inverse:active {
        background-color: var(--color-background-neutral-lighter);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-neutral-inverse.is-hover {
        background-color: var(--color-background-neutral-white);
      }
      .btn-neutral-inverse.is-pressed {
        background-color: var(--color-background-neutral-lighter);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-neutral-inverse.btn--loading {
        background-color: var(--color-background-neutral-lighter);
      }

      /* ══════════════════════════════════════════════════════════
         Secondary Variants
      ══════════════════════════════════════════════════════════ */

      .btn-secondary-brand,
      .btn-secondary-visible,
      .btn-secondary-neutral,
      .btn-secondary-light,
      .btn-secondary-dark {
        border-width: 1px;
        border-style: solid;
      }

      .btn-secondary-brand {
        background-color: var(--color-effect-translucent-dark-clear);
        border-color: var(--color-border-neutral-grey-light);
        color: var(--color-text-interaction-primary-default);
      }
      .btn-secondary-brand:hover {
        background-color: var(--color-effect-translucent-dark-pale);
      }
      .btn-secondary-brand:active {
        background-color: var(--color-effect-translucent-dark-pale);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-secondary-brand.is-hover {
        background-color: var(--color-effect-translucent-dark-pale);
      }
      .btn-secondary-brand.is-pressed {
        background-color: var(--color-effect-translucent-dark-pale);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-secondary-brand.btn--loading {
        background-color: var(--color-effect-translucent-dark-pale);
      }

      .btn-secondary-visible {
        background-color: var(--color-effect-translucent-dark-clear);
        border-color: var(--color-border-translucent-dark-subtle);
        color: var(--color-text-interaction-primary-default);
      }
      .btn-secondary-visible:hover {
        background-color: var(--color-effect-translucent-dark-pale);
      }
      .btn-secondary-visible:active {
        background-color: var(--color-effect-translucent-dark-pale);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-secondary-visible.is-hover {
        background-color: var(--color-effect-translucent-dark-pale);
      }
      .btn-secondary-visible.is-pressed {
        background-color: var(--color-effect-translucent-dark-pale);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-secondary-visible.btn--loading {
        background-color: var(--color-effect-translucent-dark-pale);
      }

      .btn-secondary-neutral {
        background-color: var(--color-effect-translucent-dark-clear);
        border-color: var(--color-border-neutral-grey-light);
        color: var(--color-text-neutral-darker);
      }
      .btn-secondary-neutral:hover {
        background-color: var(--color-effect-translucent-dark-pale);
      }
      .btn-secondary-neutral:active {
        background-color: var(--color-effect-translucent-dark-pale);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-secondary-neutral.is-hover {
        background-color: var(--color-effect-translucent-dark-pale);
      }
      .btn-secondary-neutral.is-pressed {
        background-color: var(--color-effect-translucent-dark-pale);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-secondary-neutral.btn--loading {
        background-color: var(--color-effect-translucent-dark-pale);
      }

      .btn-secondary-light {
        background-color: var(--color-effect-translucent-dark-clear);
        border-color: var(--color-border-translucent-dark-subtle);
        color: var(--color-text-neutral-darker);
      }
      .btn-secondary-light:hover {
        background-color: var(--color-effect-translucent-dark-pale);
      }
      .btn-secondary-light:active {
        background-color: var(--color-effect-translucent-dark-pale);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-secondary-light.is-hover {
        background-color: var(--color-effect-translucent-dark-pale);
      }
      .btn-secondary-light.is-pressed {
        background-color: var(--color-effect-translucent-dark-pale);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-secondary-light.btn--loading {
        background-color: var(--color-effect-translucent-dark-pale);
      }

      .btn-secondary-dark {
        background-color: var(--color-effect-translucent-light-clear);
        border-color: var(--color-border-translucent-light-moderate);
        color: var(--color-text-neutral-lightest);
      }
      .btn-secondary-dark:hover {
        background-color: var(--color-effect-translucent-light-pale);
      }
      .btn-secondary-dark:active {
        background-color: var(--color-effect-translucent-light-pale);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-secondary-dark.is-hover {
        background-color: var(--color-effect-translucent-light-pale);
      }
      .btn-secondary-dark.is-pressed {
        background-color: var(--color-effect-translucent-light-pale);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-secondary-dark.btn--loading {
        background-color: var(--color-effect-translucent-light-pale);
      }

      /* ══════════════════════════════════════════════════════════
         Tertiary Variants
      ══════════════════════════════════════════════════════════ */

      .btn-tertiary-brand {
        background-color: var(--color-background-neutral-lighter);
        color: var(--color-text-interaction-primary-default);
      }
      .btn-tertiary-brand:hover {
        background-color: var(--color-background-neutral-light);
      }
      .btn-tertiary-brand:active {
        background-color: var(--color-background-neutral-light);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-tertiary-brand.is-hover {
        background-color: var(--color-background-neutral-light);
      }
      .btn-tertiary-brand.is-pressed {
        background-color: var(--color-background-neutral-light);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-tertiary-brand.btn--loading {
        background-color: var(--color-background-neutral-light);
      }

      .btn-tertiary-visible {
        background-color: var(--color-effect-translucent-dark-pale);
        color: var(--color-text-interaction-primary-default);
      }
      .btn-tertiary-visible:hover {
        background-color: var(--color-effect-translucent-dark-subtle);
      }
      .btn-tertiary-visible:active {
        background-color: var(--color-effect-translucent-dark-pale);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-tertiary-visible.is-hover {
        background-color: var(--color-effect-translucent-dark-subtle);
      }
      .btn-tertiary-visible.is-pressed {
        background-color: var(--color-effect-translucent-dark-pale);
        box-shadow: inset 0 1px 1px 0 rgba(0, 0, 0, 0.4);
      }
      .btn-tertiary-visible.btn--loading {
        background-color: var(--color-effect-translucent-dark-pale);
      }

      .btn-tertiary-neutral {
        background-color: var(--color-background-neutral-lighter);
        color: var(--color-text-neutral-darker);
      }
      .btn-tertiary-neutral:hover {
        background-color: var(--color-background-neutral-light);
      }
      .btn-tertiary-neutral:active {
        background-color: var(--color-background-neutral-light);

      const s = {
        style: "general",
        size: "md",
        composition: "label-only",
        hierarchy: "primary",
        variation: "brand",
        bgColor: "#ffffff",
        bgImage: null,
      };

      /* ── Data tables ────────────────────────── */
      const HIERARCHIES = {
        general: ["primary", "secondary", "tertiary", "quaternary"],
        contextual: ["negative", "positive"],
      };

      const HIERARCHY_LABELS = {
        primary: "Primary",
        secondary: "Secondary",
        tertiary: "Tertiary",
        quaternary: "Quaternary",
        negative: "Negative",
        positive: "Positive",
      };

      const VARIATIONS = {
        primary: [
          { id: "brand", label: "Brand" },
          { id: "neutral", label: "Neutral" },
          { id: "neutral-inverse", label: "Neutral Inverse" },
        ],
        secondary: [
          { id: "default", label: "Default" },
          { id: "visible", label: "Visible" },
          { id: "neutral", label: "Neutral" },
          { id: "light-surface", label: "Light Surface" },
          { id: "dark-surface", label: "Dark Surface" },
        ],
        tertiary: [
          { id: "soft", label: "Soft" },
          { id: "visible", label: "Visible" },
          { id: "neutral", label: "Neutral" },
          { id: "light-surface", label: "Light Surface" },
          { id: "dark-surface", label: "Dark Surface" },
        ],
        quaternary: [
          { id: "default", label: "Default" },
          { id: "neutral", label: "Neutral" },
          { id: "light-surface", label: "Light Surface" },
          { id: "dark-surface", label: "Dark Surface" },
        ],
        negative: [
          { id: "solid", label: "Solid" },
          { id: "outline", label: "Outline" },
        ],
        positive: [
          { id: "solid", label: "Solid" },
          { id: "outline", label: "Outline" },
        ],
      };

      const VARIANT_CLASS = {
        "primary/brand": "btn-brand",
        "primary/neutral": "btn-neutral",
        "primary/neutral-inverse": "btn-neutral-inverse",
        "secondary/default": "btn-secondary-brand",
        "secondary/visible": "btn-secondary-visible",
        "secondary/neutral": "btn-secondary-neutral",
        "secondary/light-surface": "btn-secondary-light",
        "secondary/dark-surface": "btn-secondary-dark",
        "tertiary/soft": "btn-tertiary-brand",
        "tertiary/visible": "btn-tertiary-visible",
        "tertiary/neutral": "btn-tertiary-neutral",
        "tertiary/light-surface": "btn-tertiary-light",
        "tertiary/dark-surface": "btn-tertiary-dark",
        "quaternary/default": "btn-quaternary-brand",
        "quaternary/neutral": "btn-quaternary-neutral",
        "quaternary/light-surface": "btn-quaternary-light",
        "quaternary/dark-surface": "btn-quaternary-dark",
        "negative/solid": "btn-negative-solid",
        "negative/outline": "btn-negative-outline",
        "positive/solid": "btn-positive-solid",
        "positive/outline": "btn-positive-outline",
      };

      const SIZE_CLASS = { xs: "btn--xs", sm: "btn--sm", md: "", lg: "btn--lg", xl: "btn--xl" };

      /* ── Helpers ────────────────────────────── */
      const variantCls = () => VARIANT_CLASS[`${s.hierarchy}/${s.variation}`] || "btn-brand";
      const sizeCls = () => SIZE_CLASS[s.size] || "";

      function isColorDark(hex) {
        if (!hex || hex.length < 7) return false;
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return (0.299 * r + 0.587 * g + 0.114 * b) / 255 < 0.5;
      }

      function syncPickerUI() {
        const picker = document.getElementById("bg-picker");
        const colorPick = document.getElementById("ctrl-color-pick");
        if (picker && !s.bgImage) picker.value = s.bgColor;

        let matched = false;
        document.querySelectorAll(".ctrl-swatch").forEach(sw => {
          let hit = false;
          if (sw.dataset.bgImage) {
            hit = sw.dataset.bgImage === s.bgImage;
          } else if (sw.dataset.bg) {
            hit = !s.bgImage && sw.dataset.bg.toLowerCase() === s.bgColor.toLowerCase();
          }
          sw.classList.toggle("is-active", hit);
          if (hit) matched = true;
        });
        if (colorPick) colorPick.classList.toggle("is-active", !matched && !s.bgImage);
      }

      function syncBgToVariant() {
        s.bgImage = null;
        if (s.variation === "neutral-inverse" || s.variation === "dark-surface") {
          s.bgColor = "#1a1a1a";
        } else if (s.variation === "visible") {
          s.bgColor = "#e3e3e3"; /* --color-background-neutral-light */
        } else if (s.variation === "light-surface") {
          s.bgColor = "#cccccc"; /* --color-background-neutral-grey-light */
        } else {
          s.bgColor = "#ffffff";
        }
        syncPickerUI();
      }

      /* ── Token data ─────────────────────────── */
      const TOKEN_DATA = {
        "primary/brand": [
          { state: "Default", tokens: ["background-interaction-primary-default", "text-neutral-white"] },
          { state: "Hover", tokens: ["background-interaction-primary-hover"] },
          { state: "Pressed", tokens: ["background-interaction-primary-pressed"], shadow: true },
        ],
        "primary/neutral": [
          { state: "Default", tokens: ["background-neutral-darker", "text-neutral-lightest"] },
          { state: "Hover", tokens: ["background-neutral-dark"] },
          { state: "Pressed", tokens: ["background-neutral-grey-dark"], shadow: true },
        ],
        "primary/neutral-inverse": [
          { state: "Default", tokens: ["background-neutral-light", "text-neutral-darker"] },
          { state: "Hover", tokens: ["background-neutral-white"] },
          { state: "Pressed", tokens: ["background-neutral-lighter"], shadow: true },
        ],
        "secondary/default": [
          { state: "Default", tokens: ["effect-translucent-dark-clear", "border-neutral-grey-light", "text-interaction-primary-default"] },
          { state: "Hover", tokens: ["effect-translucent-dark-pale"] },
          { state: "Pressed", tokens: ["effect-translucent-dark-pale"], shadow: true },
        ],
        "secondary/visible": [
          { state: "Default", tokens: ["effect-translucent-dark-clear", "border-translucent-dark-subtle", "text-interaction-primary-default"] },
          { state: "Hover", tokens: ["effect-translucent-dark-pale"] },
          { state: "Pressed", tokens: ["effect-translucent-dark-pale"], shadow: true },
        ],
        "secondary/neutral": [
          { state: "Default", tokens: ["effect-translucent-dark-clear", "border-neutral-grey-light", "text-neutral-darker"] },
          { state: "Hover", tokens: ["effect-translucent-dark-pale"] },
          { state: "Pressed", tokens: ["effect-translucent-dark-pale"], shadow: true },
        ],
        "secondary/light-surface": [
          { state: "Default", tokens: ["effect-translucent-dark-clear", "border-translucent-dark-subtle", "text-neutral-darker"] },
          { state: "Hover", tokens: ["effect-translucent-dark-pale"] },
          { state: "Pressed", tokens: ["effect-translucent-dark-pale"], shadow: true },
        ],
        "secondary/dark-surface": [
          { state: "Default", tokens: ["effect-translucent-light-clear", "border-translucent-light-moderate", "text-neutral-lightest"] },
          { state: "Hover", tokens: ["effect-translucent-light-pale"] },
          { state: "Pressed", tokens: ["effect-translucent-light-pale"], shadow: true },
        ],
        "tertiary/soft": [
          { state: "Default", tokens: ["background-neutral-lighter", "text-interaction-primary-default"] },
          { state: "Hover", tokens: ["background-neutral-light"] },
          { state: "Pressed", tokens: ["background-neutral-light"], shadow: true },
        ],
        "tertiary/visible": [
          { state: "Default", tokens: ["effect-translucent-dark-pale", "text-interaction-primary-default"] },
          { state: "Hover", tokens: ["effect-translucent-dark-subtle"] },
          { state: "Pressed", tokens: ["effect-translucent-dark-pale"], shadow: true },
        ],
        "tertiary/neutral": [
          { state: "Default", tokens: ["background-neutral-lighter", "text-neutral-darker"] },
          { state: "Hover", tokens: ["background-neutral-light"] },
          { state: "Pressed", tokens: ["background-neutral-light"], shadow: true },
        ],
        "tertiary/light-surface": [
          { state: "Default", tokens: ["effect-translucent-dark-moderate", "text-neutral-lightest"] },
          { state: "Hover", tokens: ["effect-translucent-dark-deep"] },
          { state: "Pressed", tokens: ["effect-translucent-dark-deep"], shadow: true },
        ],
        "tertiary/dark-surface": [
          { state: "Default", tokens: ["effect-translucent-light-deep", "text-neutral-darker"] },
          { state: "Hover", tokens: ["effect-translucent-light-thick"] },
          { state: "Pressed", tokens: ["effect-translucent-light-thick"], shadow: true },
        ],
        "quaternary/default": [
          { state: "Default", tokens: ["effect-translucent-dark-clear", "text-interaction-primary-default"] },
          { state: "Hover", tokens: ["background-neutral-light"] },
          { state: "Pressed", tokens: ["background-neutral-light"], shadow: true },
        ],
        "quaternary/neutral": [
          { state: "Default", tokens: ["effect-translucent-dark-clear", "text-neutral-darker"] },
          { state: "Hover", tokens: ["background-neutral-light"] },
          { state: "Pressed", tokens: ["background-neutral-light"], shadow: true },
        ],
        "quaternary/light-surface": [
          { state: "Default", tokens: ["effect-translucent-dark-clear", "text-neutral-darker"] },
          { state: "Hover", tokens: ["effect-translucent-dark-subtle"] },
          { state: "Pressed", tokens: ["effect-translucent-dark-subtle"], shadow: true },
        ],
        "quaternary/dark-surface": [
          { state: "Default", tokens: ["effect-translucent-light-clear", "text-neutral-lightest"] },
          { state: "Hover", tokens: ["effect-translucent-light-subtle"] },
          { state: "Pressed", tokens: ["effect-translucent-light-subtle"], shadow: true },
        ],
        "negative/solid": [
          { state: "Default", tokens: ["background-interaction-negative-default", "text-neutral-white"] },
          { state: "Hover", tokens: ["background-interaction-negative-hover"] },
          { state: "Pressed", tokens: ["background-interaction-negative-pressed"], shadow: true },
        ],
        "negative/outline": [
          { state: "Default", tokens: ["effect-translucent-dark-clear", "border-neutral-grey-light", "text-interaction-negative-default"] },
          { state: "Hover", tokens: ["effect-translucent-dark-pale", "border-translucent-dark-subtle"] },
          { state: "Pressed", tokens: ["effect-translucent-dark-pale", "border-translucent-dark-subtle"], shadow: true },
        ],
        "positive/solid": [
          { state: "Default", tokens: ["background-interaction-positive-default", "text-neutral-white"] },
          { state: "Hover", tokens: ["background-interaction-positive-hover"] },
          { state: "Pressed", tokens: ["background-interaction-positive-pressed"], shadow: true },
        ],
        "positive/outline": [
          { state: "Default", tokens: ["effect-translucent-dark-clear", "border-neutral-grey-light", "text-interaction-positive-default"] },
          { state: "Hover", tokens: ["effect-translucent-dark-pale", "border-translucent-dark-subtle"] },
          { state: "Pressed", tokens: ["effect-translucent-dark-pale", "border-translucent-dark-subtle"], shadow: true },
        ],
      };

      function renderNote() {
        const key = `${s.hierarchy}/${s.variation}`;
        const sections = TOKEN_DATA[key] || [];
        const note = document.getElementById("token-note");

        const sectionsHtml = sections
          .map(sec => {
            const tokens = sec.tokens.map(t => `<span class="tn-token">⚫ --color-${t}</span>`).join("");
            const shadow = sec.shadow ? `<span class="tn-shadow">🔷 box-shadow: inset 0 1px 1px 0 rgba(0,0,0,.4)</span>` : "";
            return `<div class="tn-section">
            <div class="tn-state">${sec.state}</div>
            ${tokens}${shadow}
          </div>`;
          })
          .join("");

        note.innerHTML = `<div class="tn-heading">Colour Tokens</div>${sectionsHtml}`;
      }

      /* ── Button HTML builder ─────────────────── */
      function buildBtn(stateClass) {
        const isIconOnly = s.composition === "icon-only";
        const isLoading = stateClass === "btn--loading";

        const classes = ["btn", variantCls(), sizeCls(), isIconOnly ? "btn--icon-only" : "", stateClass].filter(Boolean).join(" ");

        const aria = isLoading ? ' aria-label="Loading"' : isIconOnly ? ' aria-label="Action"' : "";

        let inner = "";
        switch (s.composition) {
          case "label-only":
            inner = `<span class="btn__label">Button</span>`;
            break;
          case "icon-label":
            inner = `<span class="btn__content">${mkSvg(P_POINTER)}<span class="btn__label">Button</span></span>`;
            break;
          case "label-addon":
            inner = `<span class="btn__content"><span class="btn__label">Button</span>${mkSvg(P_ADD)}</span>`;
            break;
          case "icon-only":
            inner = `<span class="btn__content">${mkSvg(P_PLAY)}</span>`;
            break;
        }

        return `<button class="${classes}"${aria}>${inner}${mkSvg(P_SPINNER, "btn-spinner")}</button>`;
      }

      /* ── Render ─────────────────────────────── */
      function applyBg(el) {
        if (s.bgImage) {
          el.style.background = "";
          el.style.backgroundImage = `url('${s.bgImage}')`;
          el.style.backgroundSize = "cover";
          el.style.backgroundPosition = "center";
        } else {
          el.style.backgroundImage = "";
          el.style.background = s.bgColor;
        }
      }

      function render() {
        const dark = s.bgImage ? s.bgImage.includes("dark") : isColorDark(s.bgColor);

        const previewBg = document.getElementById("preview-bg");
        applyBg(previewBg);
        document.getElementById("live-btn-wrap").innerHTML = buildBtn("");

        const statesRow = document.getElementById("states-row");
        applyBg(statesRow);
        statesRow.style.borderTopColor = dark ? "#2a2a2a" : "";
        statesRow.classList.toggle("is-dark", dark);

        document.getElementById("state-default").innerHTML = buildBtn("");
        document.getElementById("state-hover").innerHTML = buildBtn("is-hover");
        document.getElementById("state-loading").innerHTML = buildBtn("btn--loading");
        document.getElementById("state-pressed").innerHTML = buildBtn("is-pressed");

        const COMP_LABELS = { "label-only": "Label Only", "icon-label": "Icon + Label", "label-addon": "Label + Addon", "icon-only": "Icon Only" };
        const varLabel = (VARIATIONS[s.hierarchy] || []).find(v => v.id === s.variation)?.label || "";
        const labelEl = document.getElementById("preview-label");
        labelEl.innerHTML = `
          <span class="preview-label-name">${HIERARCHY_LABELS[s.hierarchy]} ${varLabel}</span>
          <span class="preview-label-meta">${s.size.toUpperCase()} · ${COMP_LABELS[s.composition]}</span>`;
        labelEl.querySelector(".preview-label-name").style.color = dark ? "rgba(255,255,255,0.85)" : "";
        labelEl.querySelector(".preview-label-meta").style.color = dark ? "rgba(255,255,255,0.35)" : "";

        attachLiveBtn();
        renderNote();
      }

      /* ── Live button click sequence ─────────── */
      function attachLiveBtn() {
        const btn = document.querySelector("#live-btn-wrap .btn");
        if (!btn) return;
        btn.addEventListener("click", () => {
          if (btn.dataset.animating) return;
          btn.dataset.animating = "1";
          btn.style.pointerEvents = "none";

          btn.classList.add("btn--loading");
          setTimeout(() => {
            btn.classList.remove("btn--loading");
            btn.classList.add("is-pressed");
            setTimeout(() => {
              btn.classList.add("btn--dissolve");
              btn.classList.remove("is-pressed");
              setTimeout(() => {
                btn.classList.remove("btn--dissolve");
                btn.style.pointerEvents = "";
                delete btn.dataset.animating;
              }, 1000);
            }, 3000);
          }, 3000);
        });
      }

      /* ── Control rebuilders ─────────────────── */
      function rebuildHierarchy() {
        const wrap = document.getElementById("ctrl-hierarchy");
        wrap.innerHTML = HIERARCHIES[s.style].map(h => `<button class="ctrl-seg-btn${h === s.hierarchy ? " is-active" : ""}" data-value="${h}">${HIERARCHY_LABELS[h]}</button>`).join("");
      }

      function rebuildVariation() {
        const wrap = document.getElementById("ctrl-variation");
        wrap.innerHTML = (VARIATIONS[s.hierarchy] || []).map(v => `<button class="ctrl-seg-btn${v.id === s.variation ? " is-active" : ""}" data-value="${v.id}">${v.label}</button>`).join("");
      }

      /* ── Event handling ─────────────────────── */
      document.querySelectorAll(".ctrl-seg").forEach(seg => {
        seg.addEventListener("click", e => {
          const btn = e.target.closest(".ctrl-seg-btn");
          if (!btn) return;

          const ctrlName = seg.dataset.ctrl;
          const value = btn.dataset.value;

          seg.querySelectorAll(".ctrl-seg-btn").forEach(b => b.classList.remove("is-active"));
          btn.classList.add("is-active");
          s[ctrlName] = value;

          if (ctrlName === "style") {
            s.hierarchy = HIERARCHIES[value][0];
            rebuildHierarchy();
            s.variation = VARIATIONS[s.hierarchy][0].id;
            rebuildVariation();
            syncBgToVariant();
          } else if (ctrlName === "hierarchy") {
            s.variation = VARIATIONS[value][0].id;
            rebuildVariation();
            syncBgToVariant();
          } else if (ctrlName === "variation") {
            syncBgToVariant();
          }

          render();
        });
      });

      /* ── Init ───────────────────────────────── */
      rebuildHierarchy();
      rebuildVariation();
      syncPickerUI();
      render();

      document.getElementById("ctrl-swatches").addEventListener("click", e => {
        const swatch = e.target.closest(".ctrl-swatch");
        if (!swatch) return;
        if (swatch.dataset.bgImage) {
          s.bgImage = swatch.dataset.bgImage;
        } else {
          s.bgImage = null;
          s.bgColor = swatch.dataset.bg;
        }
        syncPickerUI();
        render();
      });

      document.getElementById("bg-picker").addEventListener("input", e => {
        s.bgImage = null;
        s.bgColor = e.target.value;
        syncPickerUI();
        render();
      });
    </script>
  </body>
</html>
