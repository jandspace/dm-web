<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ── Left Panel ─────────────────────────── -->
    <aside class="demo-gen-panel">
      <div class="demo-panel-header">
        <h1 class="demo-panel-title">Button Generator</h1>
      </div>

      <div class="demo-panel-controls">
        <!-- Style -->
        <div class="ctrl-group">
          <span class="demo-ctrl-label">Style</span>
          <div class="demo-ctrl-seg" data-ctrl="style">
            <button class="demo-ctrl-seg-btn is-active" data-value="general">General Situation</button>
            <button class="demo-ctrl-seg-btn" data-value="contextual">Contextual Situation</button>
          </div>
        </div>

        <!-- Size -->
        <div class="ctrl-group">
          <span class="demo-ctrl-label">Size</span>
          <div class="demo-ctrl-seg" data-ctrl="size">
            <button class="demo-ctrl-seg-btn" data-value="xs">XS</button>
            <button class="demo-ctrl-seg-btn" data-value="sm">SM</button>
            <button class="demo-ctrl-seg-btn is-active" data-value="md">MD</button>
            <button class="demo-ctrl-seg-btn" data-value="lg">LG</button>
            <button class="demo-ctrl-seg-btn" data-value="xl">XL</button>
          </div>
        </div>

        <!-- Composition -->
        <div class="ctrl-group">
          <span class="demo-ctrl-label">Composition</span>
          <div class="demo-ctrl-seg" data-ctrl="composition">
            <button class="demo-ctrl-seg-btn is-active" data-value="label-only">Label Only</button>
            <button class="demo-ctrl-seg-btn" data-value="icon-label">Icon + Label</button>
            <button class="demo-ctrl-seg-btn" data-value="label-addon">Label + Addon</button>
            <button class="demo-ctrl-seg-btn" data-value="icon-only">Icon Only</button>
          </div>
        </div>

        <!-- Hierarchy — populated by JS -->
        <div class="ctrl-group">
          <span class="demo-ctrl-label">Hierarchy</span>
          <div class="demo-ctrl-seg" data-ctrl="hierarchy" id="ctrl-hierarchy"></div>
        </div>

        <!-- Variation — populated by JS -->
        <div class="ctrl-group">
          <span class="demo-ctrl-label">Variation</span>
          <div class="demo-ctrl-seg" data-ctrl="variation" id="ctrl-variation"></div>
        </div>

        <!-- Background -->
        <div class="ctrl-group">
          <span class="demo-ctrl-label">Background</span>
          <div class="demo-ctrl-bg-row">
            <div class="demo-ctrl-swatches" id="ctrl-swatches">
              <button class="demo-ctrl-swatch is-active" data-bg="#ffffff" style="background: #ffffff" title="White"></button>
              <button class="demo-ctrl-swatch" data-bg="#f5f5f5" style="background: #f5f5f5" title="Lighter"></button>
              <button class="demo-ctrl-swatch" data-bg="#e3e3e3" style="background: #e3e3e3" title="Light"></button>
              <button class="demo-ctrl-swatch" data-bg="#cccccc" style="background: #cccccc" title="Grey"></button>
              <button class="demo-ctrl-swatch" data-bg="#666666" style="background: #666666" title="Grey Dark"></button>
              <button class="demo-ctrl-swatch" data-bg="#333333" style="background: #333333" title="Dark"></button>
              <button class="demo-ctrl-swatch" data-bg="#1a1a1a" style="background: #1a1a1a" title="Darker"></button>
              <button class="demo-ctrl-swatch" data-bg="#000000" style="background: #000000" title="Black"></button>
              <button class="demo-ctrl-swatch" data-bg-image="../../assets/images/background-light.jpg" style="background-image: url(&quot;../../assets/images/background-light.jpg&quot;)" title="Light Image"></button>
              <button class="demo-ctrl-swatch" data-bg-image="../../assets/images/background-dark.jpg" style="background-image: url(&quot;../../assets/images/background-dark.jpg&quot;)" title="Dark Image"></button>
            </div>
            <label class="demo-ctrl-color-pick" title="Custom colour" id="ctrl-color-pick">
              <input type="color" id="bg-picker" value="#ffffff" />
            </label>
          </div>
        </div>
      </div>
    </aside>

    <!-- ── Main ───────────────────────────────── -->
    <main class="demo-gen-main">
      <!-- Live preview -->
      <div class="demo-gen-preview-main" id="preview-bg">
        <div class="demo-preview-content">
          <div class="demo-preview-label" id="preview-label"></div>
          <div id="live-btn-wrap"></div>
        </div>
        <div class="demo-token-note" id="token-note"></div>
      </div>

      <!-- States row -->
      <div class="demo-gen-states" id="states-row">
        <div class="demo-gen-state">
          <div class="demo-gen-state-preview" id="state-default"></div>
          <span class="demo-gen-state-label">Default</span>
        </div>
        <div class="demo-gen-state">
          <div class="demo-gen-state-preview" id="state-hover"></div>
          <span class="demo-gen-state-label">Hover</span>
        </div>
        <div class="demo-gen-state">
          <div class="demo-gen-state-preview" id="state-loading"></div>
          <span class="demo-gen-state-label">Loading</span>
        </div>
        <div class="demo-gen-state">
          <div class="demo-gen-state-preview" id="state-pressed"></div>
          <span class="demo-gen-state-label">Pressed</span>
        </div>
      </div>
    </main>

      /* ── Helpers ────────────────────────────── */
      const variantCls = () => VARIANT_CLASS[`${s.hierarchy}/${s.variation}`] || "btn-brand";

      function isColorDark(hex) {
        if (!hex || hex.length < 7) return false;
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return (0.299 * r + 0.587 * g + 0.114 * b) / 255 < 0.5;
      }

      function syncPickerUI() {
        const picker = document.getElementById("bg-picker");
        const colorPick = document.getElementById("ctrl-color-pick");
        if (picker && !s.bgImage) picker.value = s.bgColor;

        let matched = false;
        document.querySelectorAll(".demo-ctrl-swatch").forEach(sw => {
          let hit = false;
          if (sw.dataset.bgImage) {
            hit = sw.dataset.bgImage === s.bgImage;
          } else if (sw.dataset.bg) {
            hit = !s.bgImage && sw.dataset.bg.toLowerCase() === s.bgColor.toLowerCase();
          }
          sw.classList.toggle("is-active", hit);
          if (hit) matched = true;
        });
        if (colorPick) colorPick.classList.toggle("is-active", !matched && !s.bgImage);
      }

      function syncBgToVariant() {
        s.bgImage = null;
        if (s.variation === "dark-surface") {
          s.bgImage = "../../assets/images/background-dark.jpg";
        } else if (s.variation === "light-surface") {
          s.bgImage = "../../assets/images/background-light.jpg";
        } else if (s.variation === "neutral-inverse") {
          s.bgColor = "#1a1a1a";
        } else if (s.variation === "visible") {
          s.bgColor = "#e3e3e3"; /* --color-background-neutral-light */
        } else {
          s.bgColor = "#ffffff";
        }
        syncPickerUI();

      function renderNote() {
        const key = `${s.hierarchy}/${s.variation}`;
        const sections = TOKEN_DATA[key] || [];
        const note = document.getElementById("token-note");

        const sectionsHtml = sections
          .map(sec => {
            const tokens = sec.tokens.map(t => `<span class="demo-tn-token">⚫ --color-${t}</span>`).join("");
            const shadow = sec.shadow ? `<span class="demo-tn-shadow">🔷 box-shadow: inset 0 1px 1px 0 rgba(0,0,0,.4)</span>` : "";
            return `<div class="demo-tn-section">
            <div class="demo-tn-state">${sec.state}</div>
            ${tokens}${shadow}
          </div>`;
          })
          .join("");

        note.innerHTML = `<div class="demo-tn-heading">Colour Tokens</div>${sectionsHtml}`;
      }

      /* ── Button HTML builder ─────────────────── */
      function buildBtn(stateClass) {
        const isIconOnly = s.composition === "icon-only";
        const isLoading = stateClass === "btn--loading";

        const classes = ["btn", variantCls(), sizeCls(), isIconOnly ? "btn--icon-only" : "", stateClass].filter(Boolean).join(" ");

        const aria = isLoading ? ' aria-label="Loading"' : isIconOnly ? ' aria-label="Action"' : "";

        let inner = "";
        switch (s.composition) {
          case "label-only":
            inner = `<span class="btn__label">Button</span>`;
            break;
          case "icon-label":
            inner = `<span class="btn__content">${mkSvg(P_POINTER)}<span class="btn__label">Button</span></span>`;
            break;
          case "label-addon":
            inner = `<span class="btn__content"><span class="btn__label">Button</span>${mkSvg(P_ADD)}</span>`;
            break;
          case "icon-only":
            inner = `<span class="btn__content">${mkSvg(P_PLAY)}</span>`;
            break;
        }

        return `<button class="${classes}"${aria}>${inner}${mkSvg(P_SPINNER, "btn-spinner")}</button>`;
      }

      /* ── Render ─────────────────────────────── */
      function applyBg(el) {
        if (s.bgImage) {
          el.style.background = "";
          el.style.backgroundImage = `url('${s.bgImage}')`;
          el.style.backgroundSize = "cover";
          el.style.backgroundPosition = "center";
        } else {
          el.style.backgroundImage = "";
          el.style.background = s.bgColor;
        }
      }

      function render() {
        const dark = s.bgImage ? s.bgImage.includes("dark") : isColorDark(s.bgColor);

        const previewBg = document.getElementById("preview-bg");
        applyBg(previewBg);
        document.getElementById("live-btn-wrap").innerHTML = buildBtn("");

        const statesRow = document.getElementById("states-row");
        applyBg(statesRow);
        statesRow.style.borderTopColor = dark ? "#2a2a2a" : "";
        statesRow.classList.toggle("is-dark", dark);

        document.getElementById("state-default").innerHTML = buildBtn("");
        document.getElementById("state-hover").innerHTML = buildBtn("is-hover");
        document.getElementById("state-loading").innerHTML = buildBtn("btn--loading");
        document.getElementById("state-pressed").innerHTML = buildBtn("is-pressed");

        const COMP_LABELS = { "label-only": "Label Only", "icon-label": "Icon + Label", "label-addon": "Label + Addon", "icon-only": "Icon Only" };
        const varLabel = (VARIATIONS[s.hierarchy] || []).find(v => v.id === s.variation)?.label || "";
        const labelEl = document.getElementById("preview-label");
        labelEl.innerHTML = `
          <span class="demo-preview-label-name">${HIERARCHY_LABELS[s.hierarchy]} ${varLabel}</span>
          <span class="demo-preview-label-meta">${s.size.toUpperCase()} · ${COMP_LABELS[s.composition]}</span>`;
        labelEl.querySelector(".demo-preview-label-name").style.color = dark ? "rgba(255,255,255,0.85)" : "";
        labelEl.querySelector(".demo-preview-label-meta").style.color = dark ? "rgba(255,255,255,0.35)" : "";

        attachLiveBtn();
        renderNote();
      }

      /* ── Live button click sequence ─────────── */
      function attachLiveBtn() {
        const btn = document.querySelector("#live-btn-wrap .btn");
        if (!btn) return;
        btn.addEventListener("click", () => {
          if (btn.dataset.animating) return;
          btn.dataset.animating = "1";
          btn.style.pointerEvents = "none";

          btn.classList.add("btn--loading");
          setTimeout(() => {
            btn.classList.remove("btn--loading");
            btn.classList.add("is-pressed");
            setTimeout(() => {
              btn.classList.add("btn--dissolve");
              btn.classList.remove("is-pressed");
              setTimeout(() => {
                btn.classList.remove("btn--dissolve");
                btn.style.pointerEvents = "";
                delete btn.dataset.animating;
              }, 1000);
            }, 3000);
          }, 3000);
        });
      }

      /* ── Control rebuilders ─────────────────── */
      function rebuildHierarchy() {
        const wrap = document.getElementById("ctrl-hierarchy");
        wrap.innerHTML = HIERARCHIES[s.style].map(h => `<button class="demo-ctrl-seg-btn${h === s.hierarchy ? " is-active" : ""}" data-value="${h}">${HIERARCHY_LABELS[h]}</button>`).join("");
      }

      function rebuildVariation() {
        const wrap = document.getElementById("ctrl-variation");
        wrap.innerHTML = (VARIATIONS[s.hierarchy] || []).map(v => `<button class="demo-ctrl-seg-btn${v.id === s.variation ? " is-active" : ""}" data-value="${v.id}">${v.label}</button>`).join("");
      }

      /* ── Event handling ─────────────────────── */
      document.querySelectorAll(".demo-ctrl-seg").forEach(seg => {
        seg.addEventListener("click", e => {
          const btn = e.target.closest(".demo-ctrl-seg-btn");
          if (!btn) return;

          const ctrlName = seg.dataset.ctrl;
          const value = btn.dataset.value;

          seg.querySelectorAll(".demo-ctrl-seg-btn").forEach(b => b.classList.remove("is-active"));
          btn.classList.add("is-active");
          s[ctrlName] = value;

          if (ctrlName === "style") {
            s.hierarchy = HIERARCHIES[value][0];
            rebuildHierarchy();
            s.variation = VARIATIONS[s.hierarchy][0].id;
            rebuildVariation();
            syncBgToVariant();
          } else if (ctrlName === "hierarchy") {
            s.variation = VARIATIONS[value][0].id;
            rebuildVariation();
            syncBgToVariant();
          } else if (ctrlName === "variation") {
            syncBgToVariant();
          }

          render();
        });
      });

      /* ── Init ───────────────────────────────── */
      rebuildHierarchy();
      rebuildVariation();
      syncPickerUI();
      render();

      document.getElementById("ctrl-swatches").addEventListener("click", e => {
        const swatch = e.target.closest(".demo-ctrl-swatch");
        if (!swatch) return;
        if (swatch.dataset.bgImage) {
          s.bgImage = swatch.dataset.bgImage;
        } else {
          s.bgImage = null;
          s.bgColor = swatch.dataset.bg;
        }
        syncPickerUI();
        render();
      });

      document.getElementById("bg-picker").addEventListener("input", e => {
        s.bgImage = null;
        s.bgColor = e.target.value;
        syncPickerUI();
        render();
      });
    </script>
  </body>
</html>
